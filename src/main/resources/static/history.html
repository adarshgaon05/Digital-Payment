<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transaction History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f1f5f9;
}

.sidebar {
    height: 100vh;
    background: linear-gradient(180deg,#0f172a,#1e293b);
    color: white;
    padding: 25px;
}

.sidebar a {
    color: #94a3b8;
    display: block;
    padding: 12px;
    text-decoration: none;
    border-radius: 10px;
    margin-bottom: 5px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.08);
    color: white;
}

.card {
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar">
<h5>💳 Wallet User</h5>
<hr>
<a href="dashboard.html">Dashboard</a>
<a href="history.html">Transaction History</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<!-- Main Content -->
<div class="col-md-10 p-4">

<div class="card p-4">
<h4>Transaction History</h4>
<hr>

<table class="table table-striped">
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="transactionTable">
</tbody>
</table>

</div>

</div>
</div>
</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}

// Fetch Transaction History
fetch("http://localhost:8080/api/wallet/history", {
    headers: {
        "Authorization": "Bearer " + token
    }
})
.then(res => res.json())
.then(data => {

    let rows = "";

    data.forEach(tx => {

        // Fix Spring Boot LocalDateTime format
        let formattedDate = "";

        if (tx.timestamp) {
            formattedDate = tx.timestamp.replace("T", " ");
        }

        rows += `
            <tr>
                <td>${formattedDate}</td>
                <td>${tx.status}</td>
                <td>₹ ${tx.amount}</td>
            </tr>
        `;
    });

    document.getElementById("transactionTable").innerHTML = rows;
})
.catch(err => {
    alert("Error loading transactions");
});

function logout(){
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

</script>

</body>
</html>
